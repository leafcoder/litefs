<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="专业投票系统 - 高效、可靠的企业级投票解决方案">
    <meta name="keywords" content="投票,在线投票,企业投票,投票系统">
    <title><%block name="title">投票系统</%block></title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="header-inner">
                <div class="brand">
                    <a href="/" class="brand-link">
                        <div class="brand-logo">
                            <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
                                <rect width="40" height="40" rx="8" fill="url(#logo-gradient)"/>
                                <path d="M20 10v10l7 4" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
                                <circle cx="20" cy="20" r="8" stroke="white" stroke-width="2" opacity="0.6"/>
                                <defs>
                                    <linearGradient id="logo-gradient" x1="0" y1="0" x2="40" y2="40">
                                        <stop offset="0%" stop-color="#1e3a8a"/>
                                        <stop offset="100%" stop-color="#3b82f6"/>
                                    </linearGradient>
                                </defs>
                            </svg>
                        </div>
                        <div class="brand-text">
                            <span class="brand-name">投票系统</span>
                            <span class="brand-tagline">专业 · 高效 · 可靠</span>
                        </div>
                    </a>
                </div>
                
                <nav class="nav">
                    <a href="/" class="nav-item">
                        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                            <rect x="2" y="2" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.5"/>
                            <rect x="10" y="2" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.5"/>
                            <rect x="2" y="10" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.5"/>
                            <rect x="10" y="10" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.5"/>
                        </svg>
                        <span>投票列表</span>
                    </a>
                    <a href="/poll/create" class="nav-item nav-item-primary">
                        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                            <path d="M9 3v12M3 9h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                        <span>创建投票</span>
                    </a>
                </nav>
            </div>
        </header>

        % if message:
        <div class="alert alert-${message_type}">
            <div class="alert-icon">
                % if message_type == 'success':
                <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                    <circle cx="10" cy="10" r="8" stroke="currentColor" stroke-width="2"/>
                    <path d="M6 10l3 3 5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                % elif message_type == 'error':
                <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                    <circle cx="10" cy="10" r="8" stroke="currentColor" stroke-width="2"/>
                    <path d="M10 6v4M10 13h.01" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
                % else:
                <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                    <circle cx="10" cy="10" r="8" stroke="currentColor" stroke-width="2"/>
                    <path d="M10 13v-3M10 7h.01" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
                % endif
            </div>
            <div class="alert-content">${message}</div>
        </div>
        % endif

        <main class="main">
            <%block name="content">
            </%block>
        </main>

        <footer class="footer">
            <div class="footer-inner">
                <div class="footer-brand">
                    <div class="footer-logo">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                            <rect width="24" height="24" rx="6" fill="url(#footer-gradient)"/>
                            <path d="M12 6v6l4 2.5" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
                            <defs>
                                <linearGradient id="footer-gradient" x1="0" y1="0" x2="24" y2="24">
                                    <stop offset="0%" stop-color="#1e3a8a"/>
                                    <stop offset="100%" stop-color="#3b82f6"/>
                                </linearGradient>
                            </defs>
                        </svg>
                    </div>
                    <span class="footer-title">投票系统</span>
                </div>
                <div class="footer-info">
                    <p>© 2024 投票系统 - 专业投票解决方案</p>
                    <p class="footer-tech">Powered by Litefs Framework</p>
                </div>
            </div>
        </footer>
    </div>
</body>
</html>
