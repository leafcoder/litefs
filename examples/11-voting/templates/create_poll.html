<%inherit file="base.html"/>

<%block name="title">创建投票 - 投票系统</%block>

<%block name="content">
<div class="container container-sm">
    <div class="detail-page">
        <a href="/" class="back-link">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                <path d="M15 10H5M5 10l4-4M5 10l4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span>返回列表</span>
        </a>

        <div class="create-page">
            <div class="create-header">
                <h1 class="create-title">创建新投票</h1>
                <p class="create-description">创建一个投票活动，收集大家的意见</p>
            </div>

            <form class="create-form" action="/poll/create" method="POST">
                <div class="form-group">
                    <label class="form-label" for="title">
                        <span class="form-label-text">投票标题</span>
                        <span class="form-label-required">*</span>
                    </label>
                    <input 
                        type="text" 
                        id="title" 
                        name="title" 
                        class="form-input"
                        required 
                        placeholder="请输入投票标题"
                        maxlength="200"
                    >
                    <span class="form-hint">标题长度不超过200个字符</span>
                </div>

                <div class="form-group">
                    <label class="form-label" for="description">
                        <span class="form-label-text">投票描述</span>
                        <span class="form-label-optional">（可选）</span>
                    </label>
                    <textarea 
                        id="description" 
                        name="description" 
                        class="form-textarea"
                        rows="3" 
                        placeholder="请输入投票描述（可选）"
                    ></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label">
                        <span class="form-label-text">投票选项</span>
                        <span class="form-label-required">*</span>
                    </label>
                    <div class="options-container" id="options-container">
                        <div class="option-input-row">
                            <span class="option-number">1</span>
                            <input 
                                type="text" 
                                name="options[]" 
                                class="form-input option-input"
                                required 
                                placeholder="选项 1"
                            >
                            <button type="button" class="option-remove-btn" onclick="removeOption(this)">
                                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                                    <path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                                </svg>
                            </button>
                        </div>
                        <div class="option-input-row">
                            <span class="option-number">2</span>
                            <input 
                                type="text" 
                                name="options[]" 
                                class="form-input option-input"
                                required 
                                placeholder="选项 2"
                            >
                            <button type="button" class="option-remove-btn" onclick="removeOption(this)">
                                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                                    <path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <button type="button" class="btn btn-outline btn-add-option" onclick="addOption()">
                        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                            <path d="M9 3v12M3 9h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                        <span>添加选项</span>
                    </button>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary btn-lg">
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                            <path d="M4 10h12M12 6l4 4-4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        <span>创建投票</span>
                    </button>
                    <a href="/" class="btn btn-outline btn-lg">
                        <span>取消</span>
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

<%text>
<script>
function addOption() {
    const container = document.getElementById('options-container');
    const count = container.children.length + 1;
    const div = document.createElement('div');
    div.className = 'option-input-row';
    div.innerHTML = `
        <span class="option-number">${count}</span>
        <input type="text" name="options[]" class="form-input option-input" required placeholder="选项 ${count}">
        <button type="button" class="option-remove-btn" onclick="removeOption(this)">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
        </button>
    `;
    container.appendChild(div);
    updateOptionNumbers();
}

function removeOption(btn) {
    const container = document.getElementById('options-container');
    if (container.children.length > 2) {
        btn.parentElement.remove();
        updateOptionNumbers();
    } else {
        btn.previousElementSibling.value = '';
    }
}

function updateOptionNumbers() {
    const container = document.getElementById('options-container');
    const rows = container.querySelectorAll('.option-input-row');
    rows.forEach((row, index) => {
        const number = row.querySelector('.option-number');
        const input = row.querySelector('.option-input');
        number.textContent = index + 1;
        input.placeholder = `选项 ${index + 1}`;
    });
}
</script>
</%text>
</%block>
