<%inherit file="base.html"/>

<%block name="title">${poll.title} - 投票系统</%block>

<%block name="content">
<div class="container container-sm">
    <div class="detail-page">
        <a href="/" class="back-link">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                <path d="M15 10H5M5 10l4-4M5 10l4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span>返回列表</span>
        </a>

        <div class="poll-detail">
            <div class="poll-detail-header">
                <h1 class="poll-detail-title">${poll.title}</h1>
                % if poll.description:
                <p class="poll-detail-description">${poll.description}</p>
                % endif
                <div class="poll-detail-stats">
                    <div class="stat-badge">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                            <path d="M8 2v12M2 8h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                        </svg>
                        <span>${poll.total_votes} 票</span>
                    </div>
                    <div class="stat-badge">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                            <rect x="2" y="3" width="12" height="11" rx="2" stroke="currentColor" stroke-width="1.5"/>
                            <path d="M2 6h12M5 1v2M11 1v2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                        </svg>
                        <span>${poll.created_at.strftime('%Y-%m-%d')}</span>
                    </div>
                </div>
            </div>

            <form class="vote-form" action="/poll/${poll.id}/vote" method="POST">
                <div class="vote-options">
                    <h3 class="vote-options-title">选择您的选项</h3>
                    <div class="options-list">
                        % for option in poll.options:
                        <label class="option-radio">
                            <input type="radio" name="option_id" value="${option.id}" required>
                            <div class="option-radio-box">
                                <div class="option-radio-indicator"></div>
                                <span class="option-radio-text">${option.text}</span>
                            </div>
                        </label>
                        % endfor
                    </div>
                </div>

                <div class="vote-actions">
                    <button type="submit" class="btn btn-primary btn-lg btn-block">
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                            <path d="M4 10h12M12 6l4 4-4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        <span>提交投票</span>
                    </button>
                    <a href="/poll/${poll.id}/result" class="btn btn-outline btn-lg btn-block">
                        <span>查看结果</span>
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
</%block>
