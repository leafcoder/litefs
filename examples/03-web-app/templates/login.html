<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - Litefs 博客</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .oauth-divider {
            display: flex;
            align-items: center;
            margin: 20px 0;
            color: #666;
        }
        .oauth-divider::before,
        .oauth-divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #ddd;
        }
        .oauth-divider span {
            padding: 0 15px;
            font-size: 14px;
        }
        .oauth-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .oauth-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px 20px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.2s;
        }
        .oauth-btn svg {
            width: 20px;
            height: 20px;
            margin-right: 10px;
        }
        .oauth-btn.github {
            background: #24292e;
            color: white;
        }
        .oauth-btn.github:hover {
            background: #1a1e22;
        }
        .oauth-btn.google {
            background: white;
            color: #333;
            border: 1px solid #ddd;
        }
        .oauth-btn.google:hover {
            background: #f5f5f5;
        }
        .oauth-btn.disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <a href="/">Litefs 博客</a>
        </div>
        <div class="nav-links">
            <a href="/">首页</a>
            <a href="/login">登录</a>
            <a href="/register">注册</a>
        </div>
    </nav>
    
    <main class="main-content">
        <div class="auth-container">
            <div class="auth-card">
                <h1>登录</h1>
                
                <div class="oauth-buttons">
                    <a href="/auth/github" class="oauth-btn github" id="github-btn">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/>
                        </svg>
                        使用 GitHub 登录
                    </a>
                    <a href="/auth/google" class="oauth-btn google" id="google-btn">
                        <svg viewBox="0 0 24 24">
                            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                        </svg>
                        使用 Google 登录
                    </a>
                </div>
                
                <div class="oauth-divider">
                    <span>或使用账号密码登录</span>
                </div>
                
                <form id="login-form" onsubmit="return handleLogin(event)">
                    <div class="form-group">
                        <label for="username">用户名</label>
                        <input type="text" id="username" name="username" required placeholder="请输入用户名">
                    </div>
                    <div class="form-group">
                        <label for="password">密码</label>
                        <input type="password" id="password" name="password" required placeholder="请输入密码">
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">登录</button>
                    </div>
                    <div id="error-message" class="error-message"></div>
                </form>
                <div class="auth-footer">
                    <p>还没有账号？<a href="/register">立即注册</a></p>
                    <p class="hint">默认管理员: admin / admin123</p>
                </div>
            </div>
        </div>
    </main>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const urlParams = new URLSearchParams(window.location.search);
            const error = urlParams.get('error');
            if (error === 'oauth_failed') {
                document.getElementById('error-message').textContent = '第三方登录失败，请重试';
            }
        });
        
        async function handleLogin(e) {
            e.preventDefault();
            const form = document.getElementById('login-form');
            const errorEl = document.getElementById('error-message');
            errorEl.textContent = '';
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    window.location.href = '/';
                } else {
                    errorEl.textContent = data.error || '登录失败';
                }
            } catch (e) {
                errorEl.textContent = '网络错误，请重试';
            }
            
            return false;
        }
    </script>
</body>
</html>
