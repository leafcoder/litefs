<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>${title}</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>${post['title']}</h1>
            <nav>
                <a href="/">返回首页</a>
            </nav>
        </header>

        <main>
            <article class="post-detail">
                <div class="post-meta">
                    <span class="date">发布时间: ${post['created_at']}</span>
                </div>
                <div class="post-content">
                    ${post['content']}
                </div>
            </article>
        </main>

        <footer>
            <p>Powered by Litefs</p>
        </footer>
    </div>
</body>
</html>
