# uWSGI 配置文件

[uwsgi]

# 基本配置
http = 0.0.0.0:8000  # HTTP 服务器监听地址和端口
wsgi-file = wsgi.py  # WSGI 应用文件

# 进程和线程
processes = 4  # 工作进程数
threads = 2  # 每个进程的线程数
master = true  # 启用主进程

# 超时设置
timeout = 30  # 超时时间（秒）
harakiri = 30  # 请求超时时间（秒）

# 日志配置
logto = ./logs/uwsgi.log  # 日志文件
log-level = info  # 日志级别

# 进程管理
pidfile = ./uwsgi.pid  # PID 文件
stats = 127.0.0.1:9191  # 状态监控地址

# 内存管理
memory-report = true  # 启用内存报告
buffer-size = 32768  # 缓冲区大小（字节）

# 安全设置
limit-as = 512  # 限制每个进程的内存使用（MB）
no-orphans = true  # 防止孤儿进程

# 热重载
py-autoreload = 1  # 开发模式下自动重载

# 性能优化
socket-timeout = 30  # Socket 超时时间
disable-logging = false  # 启用日志

# 环境变量
env = LANG=en_US.UTF-8
env = LC_ALL=en_US.UTF-8