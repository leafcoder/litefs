# Waitress 配置文件

# Waitress 服务器配置

## 基本配置
port = 8000  # 监听端口
host = '0.0.0.0'  # 监听地址

## 性能配置
threads = 8  # 线程数
connection_limit = 1000  # 最大连接数
channel_timeout = 30  # 通道超时时间（秒）

## 日志配置
access_log_format = '%(h)s %(l)s %(u)s %(t)s "%(r)s" %(s)s %(b)s "%(f)s" "%(a)s"'
access_log = './logs/waitress_access.log'  # 访问日志文件
error_log = './logs/waitress_error.log'  # 错误日志文件

## 安全配置
expose_tracebacks = false  # 不暴露回溯信息
ident = 'Waitress'  # 服务器标识

## 其他配置
asyncore_use_poll = true  # 使用 poll 而不是 select
busy_threads = 4  # 忙碌线程数
outbuf_overflow = 1048576  # 输出缓冲区溢出大小（字节）
outbuf_high_watermark = 16384  # 输出缓冲区高水位标记
inbuf_overflow = 524288  # 输入缓冲区溢出大小（字节）
inbuf_high_watermark = 8192  # 输入缓冲区高水位标记