<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>${title}</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>${title}</h1>
            <nav>
                <a href="/">首页</a>
                <a href="/about">关于</a>
                <a href="/user/1">用户示例</a>
            </nav>
        </header>
        
        <main>
            <section class="welcome">
                <p>访问次数: <strong>${visits}</strong></p>
            </section>
            
            <section class="features">
                <h2>核心特性</h2>
                <div class="feature-grid">
                    % for feature in features:
                    <div class="feature-card">
                        <h3>${feature['name']}</h3>
                        <p>${feature['desc']}</p>
                    </div>
                    % endfor
                </div>
            </section>
        </main>
        
        <footer>
            <p>Powered by Litefs</p>
        </footer>
    </div>
</body>
</html>
