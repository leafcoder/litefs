[server]
# 服务器配置
host = "localhost"
port = 9090
webroot = "./examples/basic/site"
debug = false
not_found = "not_found"
default_page = "index,index.html"
log = "./default.log"
listen = 1024
max_request_size = 10485760
max_upload_size = 52428800
error_pages_dir = "null"

# 缓存配置
cache_backend = "tree"
cache_max_size = 10000
cache_clean_period = 60
cache_expiration_time = 3600
file_cache_clean_period = 60
file_cache_expiration_time = 3600

# 会话配置
session_backend = "memory"
session_max_size = 1000000
session_expiration_time = 3600

# Redis 配置
redis_host = "localhost"
redis_port = 6379
redis_db = 0
redis_password = "null"
redis_key_prefix = "litefs:"
redis_session_key_prefix = "litefs:session:"

# 数据库配置
database_path = ":memory:"
database_session_table = "sessions"
database_cache_table = "cache"

# Memcache 配置
memcache_servers = "localhost:11211"
memcache_key_prefix = "litefs:"
memcache_session_key_prefix = "litefs:session:"
